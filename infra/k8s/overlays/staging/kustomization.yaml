apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namePrefix: staging-

patchesStrategicMerge:
  - deployment-patch.yaml

images:
  - name: AUTH_IMAGE_PLACEHOLDER
    newName: ghcr.io/hyunshu12/helpbee/auth-service
    newTag: latest
  - name: USER_IMAGE_PLACEHOLDER
    newName: ghcr.io/hyunshu12/helpbee/user-service
    newTag: latest
  - name: ANALYSIS_IMAGE_PLACEHOLDER
    newName: ghcr.io/hyunshu12/helpbee/analysis-service
    newTag: latest
