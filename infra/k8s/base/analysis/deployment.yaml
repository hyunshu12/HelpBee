apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-service
  namespace: helpbee
  labels:
    app: analysis-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analysis-service
  template:
    metadata:
      labels:
        app: analysis-service
    spec:
      containers:
        - name: analysis-service
          image: ANALYSIS_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8003
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: helpbee-secrets
                  key: openai-api-key
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
