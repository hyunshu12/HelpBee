version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: helpbee-postgres
    environment:
      POSTGRES_USER: helpbee_user
      POSTGRES_PASSWORD: helpbee_password
      POSTGRES_DB: helpbee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpbee_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: helpbee-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (optional, for production-like setup)
  # nginx:
  #   image: nginx:alpine
  #   container_name: helpbee-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: helpbee-network
