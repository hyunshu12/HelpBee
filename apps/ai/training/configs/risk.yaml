# 위험도(risk_score) 산출 + tier 매핑 — v0.1.0
#
# ⚠️ 71667 라벨 분석 결과(Q3=B): 응애 클래스 bbox는 응애 자체가 아닌 "응애가 보이는 벌 영역".
#    따라서 표준 VMIR(mites per 100 bees)을 직접 계산할 수 없다.
#    대신 "감염률(infestation_rate) = 감염 영역 인스턴스 / 전체 벌 인스턴스" 사용.
#
# 임계값은 Honey Bee Health Coalition 표준(VMIR 3% / 10%)을 그대로 차용.
# 측정 정의가 다르므로 베타에서 calibration 회귀 필요.
#   - 베타 양봉가 사진에 sugar-roll 또는 alcohol-wash 실측 VMIR 라벨링
#   - 우리 infestation_rate vs 실측 VMIR 회귀 → 임계값 보정
#
# 상세: apps/ai/training/datasets/AIHUB_71667.md §위험도 측정 정의

formula: infestation_rate          # 'infestation_rate' (default) | 'composite' (논문 fallback)

# ===== Infestation Rate (v0.1.0 default) =====
infestation_rate:
  # rate = (bee_with_varroa 인스턴스 수) / (모든 벌 인스턴스 수) * 100
  # 분모 = bee_normal + bee_with_varroa + bee_other_disease
  # (다른 질병도 "벌"로 카운트 — 분모 일관성 유지)

  # 임계값 (Honey Bee Health Coalition VMIR 표준 차용)
  # 측정 정의 차이 있음 → 베타에서 보정
  thresholds:
    safe_max: 3.0       # < 3.0  → safe
    watch_max: 10.0     # 3~10   → watch, > 10 → danger

  min_bee_count: 5      # 5마리 미만 탐지 → "watch" + low_confidence flag

  # risk_score 매핑 (0~100 스케일)
  score_mapping:
    rate_at_score_70: 10.0    # 감염률 10% 일 때 risk_score = 70 (watch_max)
    rate_at_score_100: 20.0   # 감염률 20%+ 면 risk_score = 100 saturation

  # 면적 가중 옵션 (v0.2.0+ 검증 후 활성화 검토)
  # rate_area = sum(varroa_area) / sum(all_bee_area). 큰 bbox 영향 낮음.
  use_area_weighting: false

# ===== 논문(KCI 2024) 방식 — 비교용 fallback =====
# 분류 모델 도입 시 논문의 (감염 벌 수 / 전체 벌 수) 와 같은 metric 비교
composite:
  K_density: 80.0
  K_count: 0.5
  thresholds:
    safe_max: 30
    watch_max: 70

# ===== 한국어 권장 조치 (recommendations enum) =====
# LLM 자유 생성 대신 enum 매핑이 일관성 ↑ (CLAUDE.md §리스크)
