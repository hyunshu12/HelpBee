  watch:
    - "응애 감염률이 주의 범위(3~10%)입니다. 처치를 검토하세요."
    - "산성 처치(개미산/옥살산) 또는 thymol 기반 처치를 고려하세요."
    - "여왕벌과 봉세를 점검하고, 3일 이내 재촬영으로 추세를 확인하세요."
  danger:
